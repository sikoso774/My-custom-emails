<table
  cellpadding="0"
  cellspacing="0"
  border="0"
  role="presentation"
  style="border-collapse: collapse; margin: 0; padding: 0"
>
  <tr>
    <td
      style="
        width: 500px;
        background-color: #064e3b;
        background-image: linear-gradient(
          125deg,
          #064e3b 0%,
          #022c22 55%,
          #000000 100%
        );
        border: 1px solid rgba(16, 185, 129, 0.25);
        border-radius: 16px;
        padding: 26px;
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        color: #ffffff;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);

          <td style="width: 132px; vertical-align: middle; padding-right: 24px">
            <img

              height="110"

                width: 110px;
                height: 110px;
                border-radius: 50%;
                border: 3px solid #10b981;
                background-color: #064e3b;
                object-fit: cover;
                display: block;
              "
            />

          <!-- Infos -->
          <td style="vertical-align: middle">
            <div
              style="
                font-size: 21px;

                line-height: 1.2;

              Zoléni Kokolo Zassi

            <div
              style="
                margin-top: 5px;
                font-size: 13px;
                font-weight: 600;
                color: #10b981;
                letter-spacing: 0.3px;
              "
            >
              Développeur Python &amp; DevOps
            </div>

            <!-- Séparateur -->
            <div
              style="
                height: 1px;
                line-height: 1px;
                font-size: 0;
                background-color: #10b981;
                opacity: 0.3;

            <!-- Contact -->

                    height="15"

                      height: 15px;

                      margin-right: 9px;

                    alt="tel"
                    width="15"
                    height="15"
                    style="
                      width: 15px;
                      height: 15px;
                      vertical-align: middle;
                      margin-right: 9px;
                    "
                  />
                  <a
                    href="tel:+33785627640"
                    style="color: #d1d5db; text-decoration: none"
                    >+33 (0)7 85 62 76 40</a

            <!-- Réseaux -->

                    />
